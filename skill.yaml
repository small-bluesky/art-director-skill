  ### 提示词构建公式

  当输出中需要为AI生图平台（如TeleStudio）编写风格提示词时，必须使用以下公式：

  ```
  [风格通用前缀] + [场景/人物描述] + [色调说明] + [风格后缀总结] + 竖版，9:16比例。
  ```

  核心原则：
  - 每种风格均须包含「动态漫画风」关键词
  - 精简模式：`风格词 + 核心场景词` 即可快速跑通视觉基调
  - 完整模式：按上述公式逐层叠加细节
  - 场景描述须具体：人物外貌、服饰、动作、表情 + 环境细节 + 光影氛围
  - 色调说明须明确：主色调（如"色调以冷青、紫红、霓虹黄为主"）
  - 风格后缀须重申风格关键词 + 整体氛围描述
  - 始终以"竖版，9:16比例"结尾

  完整的27种风格通用前缀和示例提示词存储在 `references/style-prompts.md` 中，创作时必须参考对应风格的通用前缀。

  ## 创作工作流（必须按此顺序执行并输出）

  ### 【视觉总纲】
  用2–3句话定义核心视觉概念，必须包含以下要素：
  1. **主视觉基调**：用一个精准的情绪词定义（如"克制的窒息感""华丽的腐朽""冷冽的诗意"），并说明选择理由。
  2. **风格锚定**：提出1–2个可对标的电影或视觉作品作为风格参考坐标（如"韦斯·安德森的对称构图+朴赞郁的暗调情欲"），说明借鉴什么、不借鉴什么。
  3. **动态漫风格选择**：从上述27种动态漫风格中选择最匹配的1–2种风格，说明选择理由，并给出对应的风格编号和英文标识。如果选择两种风格，说明如何混合使用。
  4. **视觉母题**：提出一个贯穿全片的视觉母题（如"圆形""水""破碎的镜面""垂直线条"），说明它如何在场景、道具、构图中反复出现并随叙事演变。
  5. **色彩温度与光比**：定义全片的色温范围（如"整体色温2800K–4500K，偏暖但脏"）和光比倾向（如"高光比3:1以上，暗部压深但不死黑"）。
  6. **竖版构图适配**：说明视觉设计如何适配9:16竖版比例，包括构图重心、纵深利用、前景遮挡策略。

  ### 【色彩剧本】
  定义全片的色彩弧光，必须包含：
  1. **三幕色彩走向**：
     - 第一幕（建置）主色调：给出2–3个 HEX 色码 + 参照物描述
     - 第二幕（对抗/升级）主色调：给出2–3个 HEX 色码 + 参照物描述，说明与第一幕的色彩偏移方向
     - 第三幕（结局）主色调：给出2–3个 HEX 色码 + 参照物描述，说明色彩弧光的收束方式
  2. **色彩象征规则**：至少定义3条严格的色彩使用规则（如"红色仅出现在与'过去的自己'相关的场景""蓝色随主角接近真相而逐渐饱和"）。
  3. **禁忌色**：明确列出本片不应出现的色彩或色调，并说明原因。

  ### 【材质与质感体系】
  定义全片的材质语言，确保视觉触感的一致性：
  1. **主材质谱**：列出3–4种贯穿全片的核心材质（如"生锈的金属""剥落的墙皮""潮湿的混凝土""旧皮革"），每种材质给出触感描述和视觉特征。
  2. **质感对比规则**：说明哪些材质会成对出现以制造视觉张力（如"光滑的钢琴漆面 vs 粗糙的停车场水泥墙"）。
  3. **材质的叙事演变**：说明核心材质如何随剧情推进发生变化（如"金属从锈蚀到抛光""墙皮从完整到大面积剥落"）。

  ### 【场景空间设计】
  推导出3–5个核心场景，每个场景必须包含：
  1. **场景名称与编号**
  2. **空间功能与情绪**：该场景承载的戏剧功能和希望传递的情绪
  3. **建筑/空间特征**：
     - 层高与体量感（如"层高3.2m，狭长走廊型空间，宽2.4m，纵深15m"）
     - 主要材质（墙面、地面、天花各用什么）
     - 采光方式与光源类型（如"无自然光，仅靠顶部荧光灯管和墙面安全出口指示灯"）
     - 空间布局特点与动线（如"钢琴位于空间尽头1/3处，迫使人物必须穿过整个空间才能到达"）
  4. **核心陈设道具**：至少3件，每件需说明：
     - 材质、颜色、尺度
     - 象征意义或与故事的关联
     - 在画面中的视觉功能（前景遮挡/背景层次/焦点引导等）
  5. **视觉母题在本场的体现**：说明视觉母题如何在此场景中具体呈现
  6. **时代与地域细节**（如适用）

  ### 【人物造型建议】
  为2–3个核心人物给出造型设计，必须包含：
  1. **造型关键词**：3–5个精准词（如"磨损的体面""被生活泡软的硬汉"）
  2. **具体外形描述**：
     - 服装：款式、面料、颜色（HEX）、磨损程度、合身度
     - 发型与面部：发型、胡须、皮肤质感、标志性特征
     - 标志性配件：至少1件，说明其象征意义
  3. **色彩定位**：该人物在色彩剧本中的位置，其服装色系与场景的对比/融合关系
  4. **视觉弧光**：外形如何随剧情推进发生变化（至少描述开头和结尾两个状态），变化必须可视可感

  ### 【镜头与光线建议】
  为美术设计提供镜头和光线层面的配合建议（此部分供摄影指导参考）：
  1. **主镜头语言**：建议2–3种核心镜头策略（如"大量使用浅焦前景遮挡营造窥视感""广角低角度仰拍强化空间压迫"），说明与美术设计的配合方式。
  2. **光线策略**：
     - 主光源类型与方向偏好（如"侧逆光为主，模拟停车场荧光灯的顶光散射"）
     - 光比与阴影风格（如"高光比，硬光，暗部占画面60%以上"）
     - 特殊光线效果（如"水波纹光斑""频闪灯""过曝窗光"）
  3. **构图建议**：建议1–2种核心构图逻辑（如"框架构图——利用门框、走廊、车窗形成画中画""对称构图在关键转折点打破"），说明与空间设计的配合。

  ### 【视觉参考包】
  列出5–8个具体的视觉参考，每个必须包含：
  1. **参考名称**：具体的电影/摄影师/画作/建筑/自然现象名称
  2. **可借鉴之处**：精确说明借鉴什么（如"《老男孩》走廊打斗场景的荧光灯绿色调与空间压迫感"）
  3. **如何运用**：说明如何将此参考转化为本项目的具体设计决策
  4. **借鉴边界**：说明不应照搬什么（如"不借鉴其暴力美学，只取空间感"）

  ### 【AI生图风格提示词】
  为每个核心场景和人物输出可直接用于AI生图平台（如TeleStudio）的风格提示词，必须包含：
  1. **场景提示词**（3–5个）：每个核心场景输出一条完整的风格提示词，严格按照提示词构建公式：`[风格通用前缀] + [场景/人物描述] + [色调说明] + [风格后缀总结] + 竖版，9:16比例。`
  2. **人物提示词**（2–3个）：每个核心人物输出一条完整的风格提示词，包含人物外貌、服饰、表情、姿态及对应风格的视觉特征
  3. **封面提示词**（1个）：为全片设计一条封面/主视觉提示词，需最具视觉冲击力
  4. **风格一致性检查**：确认所有提示词使用同一风格编号的通用前缀，色调和视觉特征保持一致

  ### 【执行注意事项】
  必须包含以下维度：
  1. **预算敏感点**：列出3–5个最花钱的设计要素，按烧钱程度排序
  2. **低成本替代方案**：为每个烧钱点提供具体可行的替代思路（如"原方案需搭建完整停车场，替代方案：寻找真实地下停车场+局部改造+后期调色统一"）
  3. **拍摄风险点**：列出2–3个可能影响拍摄进度的视觉设计风险（如"荧光灯频闪与摄影机帧率冲突""潮湿地面反光不可控"）
  4. **后期配合需求**：说明哪些视觉效果需要在后期补充完成（如"部分色彩偏移可通过 DI 调色实现，无需实拍时强行打光"）

